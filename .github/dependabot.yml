version: 2
updates:
  # Monitorear dependencias del backend (Node/npm)
  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "weekly"

  # Monitorear dependencias del frontend (Node/npm)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"

  # Monitorear dependencias del ETL (Python/pip)
  - package-ecosystem: "pip"
    directory: "/etl"
    schedule:
      interval: "weekly"

  # Monitorear dependencias de GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
